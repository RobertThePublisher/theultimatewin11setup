<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM - Windows 12 Web</title>
    <style>
        :root {
            --win-bg: #005a9e;
            --taskbar-bg: rgba(255, 255, 255, 0.8);
            --window-bg: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(45deg, #1e3a8a, #3b82f6);
        }

        /* Warning Overlay */
        #warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        /* Desktop Area */
        #desktop {
            height: calc(100vh - 50px);
            padding: 20px;
        }

        .icon {
            width: 80px;
            text-align: center;
            color: white;
            cursor: pointer;
            text-shadow: 1px 1px 2px black;
        }

        .icon img { width: 50px; display: block; margin: 0 auto 5px; }

        /* File Explorer Window */
        #explorer {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 600px;
            height: 400px;
            background: var(--window-bg);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .win-header {
            padding: 10px;
            background: #f3f3f3;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
        }

        .win-body {
            flex-grow: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .drive {
            padding: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            text-align: center;
        }

        .drive:hover {
            background: #e5f3ff;
            border: 1px solid #cce8ff;
        }

        /* Taskbar */
        #taskbar {
            height: 50px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .close-btn { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="warning-overlay">
        <h1>This project is not affiliated with Windows or Microsoft</h1>
    </div>

    <div id="desktop">
        <div class="icon" onclick="toggleExplorer()">
            <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" alt="Folder">
            File Explorer
        </div>
    </div>

    <div id="explorer">
        <div class="win-header">
            <span>File Explorer - This PC</span>
            <span class="close-btn" onclick="toggleExplorer()">X</span>
        </div>
        <div class="win-body">
            <div class="drive">
                <img src="https://cdn-icons-png.flaticon.com/512/2888/2888631.png" width="40"><br>
                <strong>Local Disk (C:)</strong><br>
                <small>70 Terabytes</small>
            </div>
            <div class="drive">
                <img src="https://cdn-icons-png.flaticon.com/512/2906/2906312.png" width="40"><br>
                <strong>SanDisk Cruzer</strong><br>
                <small>64GB</small>
            </div>
            <div class="drive">
                <img src="https://cdn-icons-png.flaticon.com/512/900/900834.png" width="40"><br>
                <strong>Driver Disk</strong><br>
                <small>500 Petabytes</small>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button onclick="toggleExplorer()">📁</button>
    </div>

    <script>
        // Handle the 3-second fade out
        window.onload = () => {
            setTimeout(() => {
                const warning = document.getElementById('warning-overlay');
                warning.style.opacity = '0';
                setTimeout(() => warning.style.display = 'none', 1000);
            }, 3000);
        };

        // Window Toggle Logic
        function toggleExplorer() {
            const explorer = document.getElementById('explorer');
            explorer.style.display = (explorer.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>
</body>
</html>

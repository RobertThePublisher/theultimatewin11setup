<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperdrive Voyager</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">Move Mouse to Steer // Space-Time Folding Active</div>
    <canvas id="starfield"></canvas>

<script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    let w, h;
    const stars = [];
    const numStars = 800;
    const speed = 15;
    let mouseX = 0;
    let mouseY = 0;

    function init() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        mouseX = w / 2;
        mouseY = h / 2;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * w - w / 2,
                y: Math.random() * h - h / 2,
                z: Math.random() * w,
                px: 0,
                py: 0
            });
        }
    }

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function draw() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, w, h);

        const cx = w / 2;
        const cy = h / 2;

        // Offset based on mouse to "steer"
        const offsetX = (mouseX - cx) * 0.5;
        const offsetY = (mouseY - cy) * 0.5;

        for (let i = 0; i < numStars; i++) {
            let s = stars[i];

            s.z -= speed;

            // If star passes the camera, reset it to the back
            if (s.z <= 0) {
                s.z = w;
                s.x = Math.random() * w - w / 2;
                s.y = Math.random() * h - h / 2;
            }

            // 3D Projection math
            const x = (s.x - offsetX) * (w / s.z) + cx;
            const y = (s.y - offsetY) * (w / s.z) + cy;

            // Draw the star line (motion blur effect)
            if (s.px !== 0) {
                const size = (1 - s.z / w) * 3;
                ctx.strokeStyle = `rgba(255, 255, 255, ${1 - s.z / w})`;
                ctx.lineWidth = size;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(s.px, s.py);
                ctx.stroke();
            }

            s.px = x;
            s.py = y;
        }

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
</script>
</body>
</html>
